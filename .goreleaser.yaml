version: 2

project_name: ogle

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    ldflags:
      - -s -w
      - -X github.com/ma-tf/ogle/internal/version.Version={{ .Version }}
      - -X github.com/ma-tf/ogle/internal/version.Commit={{ .Commit }}
      - -X github.com/ma-tf/ogle/internal/version.Date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: ^.*?feat(\([^)]*\))?!?:.*$
      order: 0
    - title: Bug fixes
      regexp: ^.*?fix(\([^)]*\))?!?:.*$
      order: 1
    - title: Documentation
      regexp: ^.*?docs(\([^)]*\))?!?:.*$
      order: 2
    - title: Other
      order: 3
