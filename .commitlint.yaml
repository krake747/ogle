min-version: v0.12.0
formatter: default
rules:
- header-min-length
- header-max-length
- body-max-line-length
- footer-max-line-length
- type-enum
severity:
  default: error
  rules: {}
settings:
  body-case:
    argument: lower-case
    flags: {}
  body-empty:
    argument: null
    flags: {}
  body-full-stop:
    argument: .
    flags: {}
  body-leading-blank:
    argument: null
    flags: {}
  body-max-length:
    argument: -1
    flags: {}
  body-max-line-length:
    argument: 100
    flags: {}
  body-min-length:
    argument: 0
    flags: {}
  breaking-change-exclamation-mark:
    argument: null
    flags: {}
  description-case:
    argument: lower-case
    flags: {}
  description-empty:
    argument: null
    flags: {}
  description-full-stop:
    argument: .
    flags: {}
  description-max-length:
    argument: -1
    flags: {}
  description-min-length:
    argument: 0
    flags: {}
  footer-empty:
    argument: null
    flags: {}
  footer-enum:
    argument: []
    flags: {}
  footer-leading-blank:
    argument: null
    flags: {}
  footer-max-length:
    argument: -1
    flags: {}
  footer-max-line-length:
    argument: 100
    flags: {}
  footer-min-length:
    argument: 0
    flags: {}
  footer-type-enum:
    argument: []
    flags: {}
  header-case:
    argument: lower-case
    flags: {}
  header-full-stop:
    argument: .
    flags: {}
  header-max-length:
    argument: 72
    flags: {}
  header-min-length:
    argument: 10
    flags: {}
  header-trim:
    argument: null
    flags: {}
  scope-case:
    argument: lower-case
    flags: {}
  scope-charset:
    argument: abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ/,
    flags: {}
  scope-empty:
    argument: null
    flags: {}
  scope-enum:
    argument: []
    flags:
      allow-empty: true
  scope-max-length:
    argument: -1
    flags: {}
  scope-min-length:
    argument: 0
    flags: {}
  signed-off-by:
    argument: Signed-off-by
    flags: {}
  trailer-exists:
    argument: Signed-off-by
    flags: {}
  type-case:
    argument: lower-case
    flags: {}
  type-charset:
    argument: abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
    flags: {}
  type-empty:
    argument: null
    flags: {}
  type-enum:
    argument:
    - feat
    - fix
    - docs
    - style
    - refactor
    - perf
    - test
    - build
    - ci
    - chore
    - revert
    flags: {}
  type-max-length:
    argument: -1
    flags: {}
  type-min-length:
    argument: 0
    flags: {}
disable-default-ignores: false
ignores: []
