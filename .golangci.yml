version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod

linters:
  # Explicit allowlist — no hidden defaults.
  default: none
  enable:
    # --- Correctness ---
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # --- Error handling ---
    - errname
    - errorlint
    - nilerr
    - nilnil
    - nilnesserr
    - wrapcheck
    # --- Context discipline ---
    - contextcheck
    - fatcontext
    # --- Style / maintainability ---
    - goconst
    - gocritic
    - misspell
    - nakedret
    - predeclared
    - revive
    - unconvert
    - unparam
    - wastedassign
    - whitespace
    - godot
    - nonamedreturns
    - funcorder
    - godoclint
    # --- Performance ---
    - mirror
    - perfsprint
    - prealloc
    # --- Modern Go idioms (Go 1.22+) ---
    - copyloopvar
    - durationcheck
    - exptostd
    - intrange
    - modernize
    - usestdlibvars
    # --- Correctness (specific checks) ---
    - exhaustive
    - gocheckcompilerdirectives
    - gochecksumtype
    - loggercheck
    - makezero
    - reassign
    - recvcheck
    - sloglint
    # --- Safety ---
    - asasalint
    - asciicheck
    - bidichk
    - embeddedstructfieldcheck
    - gomoddirectives
    - goprintffuncname
    - iotamixing
    - nosprintfhostport
    - iface
    - musttag
    - gosec
    - depguard
    # --- Complexity ---
    - cyclop
    - funlen
    - gocognit
    - gocyclo
    - nestif
    # --- Struct initialisation ---
    - exhaustruct
    # --- Global / init discipline ---
    - gochecknoglobals
    - gochecknoinits
    # --- Clone detection ---
    - dupl
    # --- Magic numbers ---
    - mnd
    # --- Lint directive hygiene ---
    - nolintlint
    # --- Return / branch clarity ---
    - nlreturn

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    depguard:
      rules:
        "deprecated-log":
          files:
            - "!**/main.go"
          deny:
            - pkg: log$
              desc: Use log/slog instead; see https://go.dev/blog/slog
        "deprecated-rand":
          deny:
            - pkg: math/rand$
              desc: Use math/rand/v2 instead; see https://go.dev/blog/randv2

    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true   # catches unchecked interface conversions

    errorlint:
      errorf: true
      errorf-multi: true            # permits fmt.Errorf("%w: %w", ...) (Go 1.20+)
      asserts: true
      comparison: true

    exhaustive:
      default-signifies-exhaustive: true
      check:
        - switch
        - map

    exhaustruct:
      exclude:
        # Bubble Tea framework types — intentionally partial initialisers.
        - ^charm\.land/bubbletea/v2\..*
        # Cobra — Command is always partially initialised.
        - ^github\.com/spf13/cobra\.Command$
        - ^github\.com/spf13/cobra\.CompletionOptions$
        # fsnotify — internal event types.
        - ^github\.com/fsnotify/fsnotify\..*
        # yaml — Node is a recursive tree structure.
        - ^go\.yaml\.in/yaml/v3\.Node$
        # Viper config — external type.
        - ^github\.com/spf13/viper\..*
        # tint — Options is always partially configured (only Level is relevant here).
        - ^github\.com/lmittmann/tint\.Options$
      allow-empty-returns: true

    funlen:
      lines: 60
      statements: 40

    gocognit:
      min-complexity: 20

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam       # struct-size threshold is context-dependent
        - rangeValCopy    # superseded by copyloopvar
        - unnamedResult   # conflicts with common Go return idioms

    govet:
      enable-all: true
      disable:
        - fieldalignment  # struct field reordering is too invasive
      settings:
        shadow:
          strict: true

    misspell:
      locale: UK

    mnd:
      ignored-functions:
        - args.Error
        - flag.Arg
        - flag.Duration.*
        - flag.Float.*
        - flag.Int.*
        - flag.Uint.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation: [ funlen, gocognit ]
      require-explanation: true   # every //nolint must have a comment
      require-specific: true      # //nolint:all is not allowed
      allow-unused: false

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming

    sloglint:
      no-global: "all"     # disallow all global slog usage, not just the default logger
      context: "scope"     # require *Context variants inside context-bearing funcs
      static-msg: true     # log messages must be string literals
      key-naming-case: camel # matches existing cfgFile, projectFile keys

    staticcheck:
      checks:
        - all
        - -ST1000   # package comment not required
        - -ST1016   # consistent receiver names (enforced by revive instead)
        - -QF1008   # omit embedded fields from selector

    unparam:
      check-exported: false  # too noisy on exported API surface

  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - std-error-handling       # suppresses common stdlib noise (e.g. io.EOF comparisons)
      - common-false-positives   # suppresses well-known false positives
    rules:
      # Cobra mandates package-level vars and init() — this is the standard idiom.
      # The application root logger is also necessarily package-level here.
      - path: cmd/
        linters:
          - gochecknoglobals
          - gochecknoinits
          - sloglint

    paths:
      - internal/tools/  # build-time docgen tool; uses log.Fatal intentionally

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ma-tf/ogle  # separates project imports from stdlib/vendor
